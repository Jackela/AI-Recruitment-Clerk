name: API Contract Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/ai-recruitment-frontend/src/app/store/**/*.ts'
      - 'apps/app-gateway/src/jobs/dto/**/*.ts'
      - 'libs/api-contracts/**/*.ts'
      - 'libs/*/src/**/*.ts'
      - 'tools/contract-validation/**/*'

permissions:
  contents: read

concurrency:
  group: contract-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
        
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript compilation check
      run: npx tsc --noEmit --project tsconfig.ci.json
      
    - name: Run contract validation
      run: npm run validate:contracts:ci
      
    - name: Test API contracts library
      run: cd libs/api-contracts && npm test
      
    - name: Build with contract validation
      run: npm run build:with-contracts
      
    - name: Upload contract validation results
      if: failure()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: contract-validation-results
        path: |
          contract-validation-*.log
          contract-validation-report.json
        retention-days: 30

  frontend-backend-consistency:
    runs-on: ubuntu-latest
    needs: validate-contracts
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check frontend model consistency
      run: |
        echo "🔍 Checking for contract drift between frontend and backend..."
        
        # Check if frontend models match backend DTOs
        FRONTEND_JOB_FIELDS=$(grep -o '\w\+:' apps/ai-recruitment-frontend/src/app/store/jobs/job.model.ts | sort)
        BACKEND_JOB_FIELDS=$(grep -o '\w\+:' apps/app-gateway/src/jobs/dto/job-response.dto.ts | sort)
        
        echo "Frontend Job Fields: $FRONTEND_JOB_FIELDS"
        echo "Backend Job Fields: $BACKEND_JOB_FIELDS"
        
        if [ "$FRONTEND_JOB_FIELDS" != "$BACKEND_JOB_FIELDS" ]; then
          echo "⚠️  Warning: Frontend and backend job models have different fields"
          echo "This may indicate contract drift that should be reviewed"
        else
          echo "✅ Frontend and backend job models appear consistent"
        fi
        
    - name: Check status enum consistency
      run: |
        echo "🔄 Checking status enum consistency..."
        
        # Extract status values from frontend and backend
        if grep -q "status.*'draft'" apps/ai-recruitment-frontend/src/app/store/jobs/job.model.ts; then
          echo "✅ Frontend defines comprehensive status enum"
        fi
        
        if grep -q "status.*'processing'" apps/app-gateway/src/jobs/dto/job-response.dto.ts; then
          echo "✅ Backend defines status enum"
        fi
        
        echo "📋 Manual review recommended to ensure status enums are synchronized"

  security-check:
    runs-on: ubuntu-latest
    needs: validate-contracts
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for hardcoded contracts
      run: |
        echo "🔒 Checking for potential security issues in contracts..."
        
        # Check for any hardcoded sensitive data in contracts (specific patterns)
        if grep -rE "password\s*=|secret\s*=|api[_-]?key\s*=|auth[_-]?token\s*=|bearer\s+" libs/api-contracts/src/ --include="*.ts"; then
          echo "❌ Found potential sensitive data in API contracts!"
          exit 1
        else
          echo "✅ No sensitive data found in API contracts"
        fi
        
    - name: Validate contract export security
      run: |
        echo "🛡️  Validating contract exports don't expose internals..."
        
        # Check that contracts only export interfaces/types, not implementation details
        if grep -r "class.*{" libs/api-contracts/src/ --include="*.ts"; then
          echo "⚠️  Warning: Found class definitions in contracts (prefer interfaces)"
        else
          echo "✅ Contracts properly use interfaces over classes"
        fi
