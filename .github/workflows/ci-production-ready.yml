# AI招聘助手 - 生产就绪CI流程
name: 🚀 AI招聘助手生产CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'test-reports/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:
  # 🔍 质量门控 - 零容错版本
  quality-gates:
    name: 🔍 质量门控
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🏗️ 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 安装依赖
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          echo "✅ 依赖安装完成"

      - name: 🧹 代码质量检查
        run: |
          echo "🧹 执行代码质量检查..."
          npm run lint
          npm run typecheck
          echo "✅ 质量检查通过"

      - name: 🔐 安全检查
        run: |
          echo "🔐 执行安全检查..."
          npm audit --audit-level moderate
          echo "✅ 安全检查完成"

  # 🧪 测试执行
  test-execution:
    name: 🧪 测试执行
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality-gates
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🏗️ 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: 📁 准备测试环境
        run: |
          mkdir -p test-reports coverage
          echo "CI=true" > .env.test

      - name: 🧪 运行测试套件
        run: |
          echo "🧪 执行测试套件..."
          npm run test:ci
          echo "✅ 测试执行完成"

      - name: 📊 生成测试报告
        run: |
          echo "📊 生成测试报告..."
          node scripts/generate-test-report.js
          echo "✅ 报告生成完成"

      - name: 💾 保存测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-reports/
            coverage/
          retention-days: 30

  # 🚀 部署就绪检查
  deployment-readiness:
    name: 🚀 部署就绪检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test-execution
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🎯 评估部署就绪状态
        run: |
          echo "🎯 评估部署就绪状态..."
          
          READINESS_SCORE=0
          
          # 检查关键文件
          if [ -f "package.json" ]; then
            READINESS_SCORE=$((READINESS_SCORE + 25))
            echo "✅ package.json存在 (+25分)"
          fi
          
          if [ -f "nixpacks.toml" ]; then
            READINESS_SCORE=$((READINESS_SCORE + 25))
            echo "✅ nixpacks.toml存在 (+25分)"
          fi
          
          if [ -f "hybrid-server.js" ]; then
            READINESS_SCORE=$((READINESS_SCORE + 30))
            echo "✅ hybrid-server.js存在 (+30分)"
          elif [ -f "enhanced-server.js" ]; then
            READINESS_SCORE=$((READINESS_SCORE + 25))
            echo "✅ enhanced-server.js存在 (+25分)"
          fi
          
          if [ -f "jest.config.js" ]; then
            READINESS_SCORE=$((READINESS_SCORE + 20))
            echo "✅ jest.config.js存在 (+20分)"
          fi
          
          echo "📊 部署就绪得分: $READINESS_SCORE/100"
          
          if [ $READINESS_SCORE -ge 80 ]; then
            echo "🎉 部署就绪 - 优秀状态!"
            echo "deployment_status=excellent" >> $GITHUB_OUTPUT
          elif [ $READINESS_SCORE -ge 60 ]; then
            echo "✅ 部署就绪 - 良好状态"
            echo "deployment_status=good" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 部署需要改进"
            echo "deployment_status=needs_improvement" >> $GITHUB_OUTPUT
          fi

    outputs:
      deployment_status: ${{ steps.deployment-readiness.outputs.deployment_status }}

  # 📊 最终验证
  final-validation:
    name: 📊 最终验证
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [quality-gates, test-execution, deployment-readiness]
    if: always()
    
    steps:
      - name: 📊 生成CI摘要
        run: |
          echo "📊 生成CI执行摘要..."
          
          QUALITY_STATUS="${{ needs.quality-gates.result }}"
          TEST_STATUS="${{ needs.test-execution.result }}"
          DEPLOY_STATUS="${{ needs.deployment-readiness.result }}"
          
          echo "🔍 质量门控: $QUALITY_STATUS"
          echo "🧪 测试执行: $TEST_STATUS"
          echo "🚀 部署检查: $DEPLOY_STATUS"
          
          # 总体评估
          if [[ "$QUALITY_STATUS" == "success" ]] && [[ "$TEST_STATUS" == "success" ]] && [[ "$DEPLOY_STATUS" == "success" ]]; then
            echo "✅ 🎉 所有CI流程通过 - 系统已准备好生产部署!"
            echo "overall_status=success" >> $GITHUB_OUTPUT
            exit 0
          elif [[ "$QUALITY_STATUS" == "success" ]] && [[ "$TEST_STATUS" == "success" ]]; then
            echo "⚠️ 核心流程通过，部署检查有问题"
            echo "overall_status=warning" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ CI流程有失败项，需要修复"
            echo "overall_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 生成最终报告
        if: always()
        run: |
          cat > CI_FINAL_REPORT.md << EOF
          # 🎯 AI招聘助手 CI 最终报告
          
          **执行时间**: $(date -u)
          **分支**: ${{ github.ref_name }}
          **提交**: ${{ github.sha }}
          **操作员**: ${{ github.actor }}
          
          ## 📊 执行结果
          
          | 流程 | 状态 | 说明 |
          |------|------|------|
          | 🔍 质量门控 | ${{ needs.quality-gates.result == 'success' && '✅ 通过' || '❌ 失败' }} | 代码质量和安全检查 |
          | 🧪 测试执行 | ${{ needs.test-execution.result == 'success' && '✅ 通过' || '❌ 失败' }} | Jest测试和报告生成 |
          | 🚀 部署检查 | ${{ needs.deployment-readiness.result == 'success' && '✅ 通过' || '❌ 失败' }} | 部署就绪状态评估 |
          
          ## 🎯 总体状态
          
          ${{ steps.final-validation.outputs.overall_status == 'success' && '🎉 **所有流程成功** - 系统已准备好生产部署!' || steps.final-validation.outputs.overall_status == 'warning' && '⚠️ **基本就绪** - 有轻微问题但可部署' || '❌ **需要修复** - 请检查失败的流程' }}
          
          ## 📈 部署建议
          
          ${{ needs.deployment-readiness.outputs.deployment_status == 'excellent' && '🌟 **优秀状态** - 立即可部署到生产环境' || needs.deployment-readiness.outputs.deployment_status == 'good' && '👍 **良好状态** - 可部署，建议小幅优化' || '🔧 **需要改进** - 建议完善配置后再部署' }}
          
          ---
          *AI招聘助手 CI/CD 自动生成报告*
          EOF

      - name: 💾 保存最终报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-final-report
          path: CI_FINAL_REPORT.md
          retention-days: 60