name: Test Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  COVERAGE_THRESHOLD: 90
  INTEGRATION_THRESHOLD: 80
  CRITICAL_PATH_THRESHOLD: 100

jobs:
  # Quality Gates and Pre-checks
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Type Check
        run: |
          npm run lint
          npm run typecheck

      - name: Security Audit
        run: npm audit --audit-level moderate

      - name: Check Dependencies
        run: |
          npx depcheck
          npm outdated || true

  # Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gates
    strategy:
      matrix:
        service: 
          - ai-recruitment-frontend
          - app-gateway
          - resume-parser-svc
          - jd-extractor-svc
          - scoring-engine-svc
          - report-generator-svc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: |
          npx nx test ${{ matrix.service }} --coverage --ci --watchAll=false
        env:
          CI: true

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/apps/${{ matrix.service }}/lcov.info
          flags: unit-tests,${{ matrix.service }}
          name: ${{ matrix.service }}-unit-coverage

      - name: Coverage Quality Gate
        run: |
          COVERAGE=$(npm run test:coverage -- --silent | grep -o '[0-9]*\.[0-9]*%' | head -1 | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "nats-server --signal=usr1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for services
        run: |
          sleep 30
          curl -f http://localhost:6379 || echo "Redis not ready"
          curl -f http://localhost:27017 || echo "MongoDB not ready"
          curl -f http://localhost:4222 || echo "NATS not ready"

      - name: Run Integration Tests
        run: |
          npx jest tests/integration --coverage --ci --detectOpenHandles --forceExit
        env:
          CI: true
          REDIS_URL: redis://localhost:6379
          MONGODB_URL: mongodb://testuser:testpass@localhost:27017/testdb
          NATS_URL: nats://localhost:4222
          NODE_ENV: test

      - name: Upload Integration Coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/integration/lcov.info
          flags: integration-tests
          name: integration-coverage

      - name: Integration Coverage Quality Gate
        run: |
          INTEGRATION_COVERAGE=$(cat coverage/integration/coverage-summary.json | jq '.total.lines.pct')
          echo "Integration Coverage: $INTEGRATION_COVERAGE%"
          if (( $(echo "$INTEGRATION_COVERAGE < ${{ env.INTEGRATION_THRESHOLD }}" | bc -l) )); then
            echo "Integration coverage $INTEGRATION_COVERAGE% is below threshold ${{ env.INTEGRATION_THRESHOLD }}%"
            exit 1
          fi

  # Critical Path Tests (Must achieve 100% coverage)
  critical-path-tests:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Critical Path Tests
        run: |
          npx jest tests/integration/critical-path-tests.spec.ts --coverage --ci --detectOpenHandles --forceExit --verbose
        env:
          CI: true
          REDIS_URL: redis://localhost:6379
          MONGODB_URL: mongodb://testuser:testpass@localhost:27017/testdb
          NATS_URL: nats://localhost:4222
          NODE_ENV: test

      - name: Critical Path Coverage Quality Gate
        run: |
          CRITICAL_COVERAGE=$(cat coverage/critical-path/coverage-summary.json | jq '.total.statements.pct')
          echo "Critical Path Coverage: $CRITICAL_COVERAGE%"
          if (( $(echo "$CRITICAL_COVERAGE < ${{ env.CRITICAL_PATH_THRESHOLD }}" | bc -l) )); then
            echo "Critical path coverage $CRITICAL_COVERAGE% is below required threshold ${{ env.CRITICAL_PATH_THRESHOLD }}%"
            exit 1
          fi

      - name: Upload Critical Path Results
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-results
          path: |
            coverage/critical-path/
            test-results/critical-path/

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: critical-path-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Performance Tests
        run: |
          npx jest tests/performance/load-testing.spec.ts --ci --detectOpenHandles --forceExit --testTimeout=120000
        env:
          CI: true
          REDIS_URL: redis://localhost:6379
          MONGODB_URL: mongodb://testuser:testpass@localhost:27017/testdb
          NATS_URL: nats://localhost:4222
          NODE_ENV: test

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            test-results/performance/
            performance-reports/

  # Error Scenario Tests
  error-scenario-tests:
    name: Error Scenario Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Error Scenario Tests
        run: |
          npx jest tests/error-scenarios/error-handling.spec.ts --ci --detectOpenHandles --forceExit --verbose
        env:
          CI: true
          NODE_ENV: test

      - name: Upload Error Scenario Results
        uses: actions/upload-artifact@v4
        with:
          name: error-scenario-results
          path: |
            test-results/error-scenarios/
            error-reports/

  # E2E Tests (Run on schedule or main branch)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [critical-path-tests]
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install

      - name: Start Application
        run: |
          npm run build
          npm run start:prod &
          sleep 30
        env:
          NODE_ENV: production

      - name: Run E2E Tests
        run: |
          npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Upload E2E Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e-results/
            playwright-report/

  # Security Tests
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Security Audit
        run: |
          npm audit --audit-level high
          npx audit-ci --high

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'

      - name: Upload Security Results
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            security-reports/
            zap-baseline-report.html

  # Test Report Generation
  generate-test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, critical-path-tests, error-scenario-tests]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate Comprehensive Test Report
        run: |
          node scripts/generate-test-report.js
        env:
          ARTIFACTS_PATH: artifacts/

      - name: Upload Final Test Report
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-report
          path: |
            test-reports/comprehensive-report.html
            test-reports/coverage-summary.json
            test-reports/quality-metrics.json

      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverageSummary = JSON.parse(fs.readFileSync('test-reports/coverage-summary.json', 'utf8'));
            const qualityMetrics = JSON.parse(fs.readFileSync('test-reports/quality-metrics.json', 'utf8'));
            
            const comment = `
            ## 🧪 Test Results Summary
            
            ### Coverage
            - **Unit Tests**: ${coverageSummary.unit}%
            - **Integration Tests**: ${coverageSummary.integration}%
            - **Critical Path**: ${coverageSummary.criticalPath}%
            
            ### Quality Metrics
            - **Tests Passed**: ${qualityMetrics.passed}/${qualityMetrics.total}
            - **Performance**: ${qualityMetrics.performance.passed ? '✅' : '❌'}
            - **Security**: ${qualityMetrics.security.passed ? '✅' : '❌'}
            - **Error Handling**: ${qualityMetrics.errorHandling.passed ? '✅' : '❌'}
            
            [View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Quality Gates Summary
  quality-gates-summary:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, critical-path-tests, error-scenario-tests]
    if: always()
    steps:
      - name: Evaluate Quality Gates
        run: |
          echo "🔍 Evaluating Quality Gates..."
          
          # Check if all required jobs passed
          UNIT_TESTS_STATUS="${{ needs.unit-tests.result }}"
          INTEGRATION_TESTS_STATUS="${{ needs.integration-tests.result }}"
          CRITICAL_PATH_STATUS="${{ needs.critical-path-tests.result }}"
          ERROR_SCENARIO_STATUS="${{ needs.error-scenario-tests.result }}"
          
          echo "Unit Tests: $UNIT_TESTS_STATUS"
          echo "Integration Tests: $INTEGRATION_TESTS_STATUS"
          echo "Critical Path Tests: $CRITICAL_PATH_STATUS"
          echo "Error Scenario Tests: $ERROR_SCENARIO_STATUS"
          
          if [[ "$UNIT_TESTS_STATUS" != "success" ]] || 
             [[ "$INTEGRATION_TESTS_STATUS" != "success" ]] || 
             [[ "$CRITICAL_PATH_STATUS" != "success" ]] || 
             [[ "$ERROR_SCENARIO_STATUS" != "success" ]]; then
            echo "❌ Quality gates failed. One or more test suites did not pass."
            exit 1
          else
            echo "✅ All quality gates passed successfully!"
          fi

      - name: Update Status Check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Quality Gates',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: conclusion === 'success' ? 'All Quality Gates Passed' : 'Quality Gates Failed',
                summary: conclusion === 'success' ? 
                  'All test suites passed and quality thresholds were met.' :
                  'One or more test suites failed or quality thresholds were not met.'
              }
            });
