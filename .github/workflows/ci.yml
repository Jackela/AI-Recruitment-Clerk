name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  file_size_check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check file sizes
        run: |
          echo "Checking for files over 500 lines..."
          FOUND=0
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "::warning file=$(echo "$line" | awk '{print $2}')::$(echo "$line" | awk '{print $2}') has $(echo "$line" | awk '{print $1}') lines (max 500)"
              FOUND=1
            fi
          done < <(find apps libs -name "*.ts" -not -path "*/node_modules/*" -exec wc -l {} \; 2>/dev/null | awk '$1 > 500 {print $0}')
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Warning: Some files exceed the 500 line limit. Consider refactoring for better maintainability."
          else
            echo "All files are within the 500 line limit."
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - run: npm ci
      - run: npm run build

  test_coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - name: Cache Jest
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('package-lock.json', '**/jest.config.*') }}
          restore-keys: |
            ${{ runner.os }}-jest-
      - run: npm ci
      - name: Run Unit Tests (Shard ${{ matrix.shard }}/4)
        run: npx nx run-many -t test --all --parallel=1 --shard=${{ matrix.shard }}/4 --coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/
          retention-days: 1

  test_coverage_merge:
    runs-on: ubuntu-latest
    needs: [test_coverage]
    timeout-minutes: 10
    outputs:
      test_duration: ${{ steps.duration.outputs.duration }}
      coverage_lines: ${{ steps.coverage.outputs.lines }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci

      - name: ⏱️ Record Start Time
        run: echo "TEST_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Download all coverage artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392443fae83e421467 # v4.1.9
        with:
          pattern: coverage-shard-*
          path: coverage/
          merge-multiple: true

      - name: Merge Coverage Reports
        run: |
          npx nyc merge coverage/ coverage/merged-coverage.json
          npx nyc report -t coverage --reporter=lcov --reporter=json-summary

      - name: ⏱️ Calculate Test Duration
        id: duration
        run: |
          TEST_END_TIME=$(date +%s)
          DURATION=$((TEST_END_TIME - TEST_START_TIME))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "⏱️ Test merge duration: ${DURATION}s"

      - name: 📊 Extract Coverage Stats
        id: coverage
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            LINES=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct))")
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "📊 Line coverage: ${LINES}%"
          else
            echo "lines=0" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@5e4f1a4f25f3c6a0f0e5b7c1f2b3c4d5e6f7a8b9c # v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: ai-recruitment-clerk
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: 📤 Upload Duration Metrics
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-metrics-${{ github.run_id }}
          path: ci-metrics/
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce thresholds
        run: node tools/ci/verify-quality-gates.mjs

  e2e_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-
      - run: npm ci
      - name: Build frontend for E2E tests
        run: npx nx build ai-recruitment-frontend --configuration=production
      - name: Start static server for E2E
        run: |
          npx nx run ai-recruitment-frontend:serve-static --port 4200 > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          echo "Waiting for server to be ready..."
          # Wait up to 60 seconds with exponential backoff
          for i in {1..12}; do
            if curl -s -f http://localhost:4200 > /dev/null 2>&1; then
              echo "Server is ready after ${i}s!"
              break
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          # Verify server is actually ready
          if ! curl -s -f http://localhost:4200 > /dev/null 2>&1; then
            echo "Server failed to start. Log output:"
            cat /tmp/server.log
            exit 1
          fi
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E Tests (Shard ${{ matrix.shard }}/4)
        working-directory: apps/ai-recruitment-frontend-e2e
        run: npx playwright test --grep-invert '@pdf-variety|@real-data' --shard=${{ matrix.shard }}/4
        env:
          CI: true
          E2E_SKIP_WEBSERVER: true
      - name: Stop static server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            apps/ai-recruitment-frontend-e2e/playwright-report
            apps/ai-recruitment-frontend-e2e/test-results
          if-no-files-found: ignore

  pii_scan:
    runs-on: ubuntu-latest
    needs: [test_coverage_merge, e2e_smoke]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Cache Nx
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .nx/cache
            node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('package-lock.json', '**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-
      - run: npm ci
      - name: PII Scan
        run: node tools/ci/pii-scan.mjs

  todo_counter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Count TODO/FIXME comments
        run: |
          echo "========================================"
          echo "TODO/FIXME Comment Counter"
          echo "========================================"
          echo ""

          # Count total TODO/FIXME comments
          TODO_COUNT=$(grep -r "TODO\|FIXME" apps libs --include="*.ts" 2>/dev/null | wc -l || echo "0")
          echo "Total TODO/FIXME comments: $TODO_COUNT"
          echo ""

          # List files with TODOs (limited to 20 for readability)
          echo "Files with TODO/FIXME comments (max 20):"
          echo "----------------------------------------"
          grep -rl "TODO\|FIXME" apps libs --include="*.ts" 2>/dev/null | head -20 || echo "No files found"
          echo ""

          # Show detailed breakdown by type
          echo "Breakdown by type:"
          echo "----------------------------------------"
          TODO_ONLY=$(grep -r "TODO" apps libs --include="*.ts" 2>/dev/null | wc -l || echo "0")
          FIXME_ONLY=$(grep -r "FIXME" apps libs --include="*.ts" 2>/dev/null | wc -l || echo "0")
          echo "  TODO comments: $TODO_ONLY"
          echo "  FIXME comments: $FIXME_ONLY"
          echo ""

          # Show first 10 actual TODO lines as examples
          if [ "$TODO_COUNT" -gt 0 ]; then
            echo "Sample TODO/FIXME entries (first 10):"
            echo "----------------------------------------"
            grep -rn "TODO\|FIXME" apps libs --include="*.ts" 2>/dev/null | head -10
          fi

          echo ""
          echo "========================================"
          echo "This is informational only - build will not fail"
          echo "========================================"
