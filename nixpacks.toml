[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmd = 'npm install --legacy-peer-deps --production'

[phases.build]
cmd = 'npm run build || echo "Build failed, using simple server fallback"'

[start]
cmd = 'npm start || node simple-server.js'

[variables]
NODE_ENV = 'production'
NPM_CONFIG_LEGACY_PEER_DEPS = 'true'
HUSKY = '0'
NPM_CONFIG_CACHE = '/tmp/.npm'
NPM_CONFIG_PROGRESS = 'false'
NPM_CONFIG_LOGLEVEL = 'warn'
NPM_CONFIG_FUND = 'false'
NPM_CONFIG_AUDIT = 'false'
CI = 'true'
NODE_OPTIONS = '--max-old-space-size=1024'